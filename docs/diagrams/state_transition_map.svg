<text xml:space="preserve" text-anchor="start" x="12.24" y="-125.65" font-family="Helvetica,sans-Serif" font-weight="bold" font-size="9.00">BOUNDARY CASES (observed live)</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-107.65" font-family="Helvetica,sans-Serif" font-size="9.00">1. Source restored WITHOUT re&#45;seal: stored = verified but check = UNVERIFIED. The stored</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-98.65" font-family="Helvetica,sans-Serif" font-size="9.00">    verdict can disagree with live state until the next enforce/seal; only a round&#45;trip</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-89.65" font-family="Helvetica,sans-Serif" font-size="9.00">    check reveals it.</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-80.65" font-family="Helvetica,sans-Serif" font-size="9.00">2. Anchors sealed before the provenance change have no sealed_by / seal_event_id.</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-71.65" font-family="Helvetica,sans-Serif" font-size="9.00">    ABSENT is not EMPTY — readers tolerate absence.</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-62.65" font-family="Helvetica,sans-Serif" font-size="9.00">3. datetime fields cannot hold empty&#45;string — omit to clear; &quot;&quot; returns 400.</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-53.65" font-family="Helvetica,sans-Serif" font-size="9.00">4. Quality anchor: latestJobEndTime may be absent even on an ACTIVE passing scan;</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-44.65" font-family="Helvetica,sans-Serif" font-size="9.00">    endTime &#45;&gt; createTime &#45;&gt; skip. Never fingerprint a None timestamp.</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-35.65" font-family="Helvetica,sans-Serif" font-size="9.00">5. Semantic drift pins drifted_hash; triage refuses to advise if the current text no</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-26.65" font-family="Helvetica,sans-Serif" font-size="9.00">    longer matches the pin (atomicity gate).</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-17.65" font-family="Helvetica,sans-Serif" font-size="9.00">6. Technical drift voids the whole certification — semantic and quality were certified</text>
<text xml:space="preserve" text-anchor="start" x="12.24" y="-8.65" font-family="Helvetica,sans-Serif" font-size="9.00">    AGAINST that schema.</text>
</g>
